[build-system]
requires = ["nanobind", "jax[cuda13]", "nvidia-cuda-cccl>=13.0.0", "scikit-build-core", "nanobind>=2.9.2"]
build-backend = "scikit_build_core.build"

[project]
name = "custom-jax"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "jax[cuda13]",
    "numpy>=2.2.6",
]

[tool.scikit-build]
#editable.rebuild = true
editable.verbose = true
build-dir = "build"
logging.level = "INFO"

[dependency-groups]
dev = [
    "ipykernel>=6.30.1",
    "matplotlib>=3.10.6",
    "pytest>=8.4.2",
]

[project.entry-points."fmdj.plugins"]
custom_jax = "custom_jax.fmdj_plugin:register"
